name: ci/cd

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-test-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 25, Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify Docker is available (Testcontainers)
        run: docker info

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: backend/target/surefire-reports

  frontend:
    name: Frontend (Node 20, Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --omit=optional
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [ backend, frontend ]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cosmo42-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: cosmo42-frontend:ci

      - name: Build LibreOffice sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/libreoffice
          push: false
          tags: cosmo42-libreoffice:ci