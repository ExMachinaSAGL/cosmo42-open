name: cosmo42

services:
  mariadb:
    container_name: cosmo42-mariadb
    image: mariadb:11.8.5
    platform: linux/amd64
    ports:
      - "33006:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      - MARIADB_DATABASE=cosmo42
      - MARIADB_USER=cosmo42
      - MARIADB_PASSWORD=${COSMO42_DB_PASSWORD:-changeme}
      - MARIADB_RANDOM_ROOT_PASSWORD=yes
    volumes:
      - cosmo42-mariadb-volume:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test:
        - "CMD"
        - "mariadb-admin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-ucosmo42"
        - "-p${COSMO42_DB_PASSWORD:-changeme}"
      timeout: 20s
      retries: 3
      interval: 10s
    restart: unless-stopped

  libreoffice:
    container_name: cosmo42-libreoffice
    build:
      context: ./libreoffice
      dockerfile: Dockerfile
    image: exm/cosmo42-libreoffice:0.0.1
    pull_policy: never
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    container_name: cosmo42-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: exm/cosmo42-backend:0.0.1
    depends_on:
      mariadb:
        condition: service_healthy
      libreoffice:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/cosmo42
      SPRING_DATASOURCE_USERNAME: cosmo42
      SPRING_DATASOURCE_PASSWORD: ${COSMO42_DB_PASSWORD:-changeme}
      COSMO42_LLM_BASE_URL: ${COSMO42_LLM_BASE_URL}
      COSMO42_LLM_API_KEY: ${COSMO42_LLM_API_KEY:-ON-PREMISE-LLM-FAKE-KEY}
      COSMO42_EMBEDDING_BASE_URL: ${COSMO42_EMBEDDING_BASE_URL}
      COSMO42_MODEL_LLM_NAME: ${COSMO42_LLM_MODEL:-gemma-4-26B}
      COSMO42_MODEL_EMBEDDING_NAME: ${COSMO42_EMBEDDING_MODEL:-BAAI/bge-m3}
      COSMO42_LIBREOFFICE_BASE_URL: http://libreoffice:3000
      COSMO42_FS_STORAGE_PATH: /var/lib/cosmo42
    volumes:
      - cosmo42-storage:/var/lib/cosmo42
    restart: unless-stopped

  frontend:
    container_name: cosmo42-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: exm/cosmo42-frontend:0.0.1
    depends_on:
      - backend
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  cosmo42-mariadb-volume:
    name: cosmo42-mariadb-data
  cosmo42-storage:
    name: cosmo42-storage-data
