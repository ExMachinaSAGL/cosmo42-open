spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=http://localhost:1
spring.ai.openai.embedding.base-url=http://localhost:1
spring.ai.openai.embedding.embeddings-path=/embeddings
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
cosmo42.libreoffice.base-url=http://localhost:1
cosmo42.model.llm.name=test-model
cosmo42.model.embedding.name=test-embedding
cosmo42.chunking.pool.size=1
cosmo42.chunking.max-tokens=16000
cosmo42.fs.storage.path=${java.io.tmpdir}/cosmo42-test
cosmo42.fs.service.implementation=local
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
