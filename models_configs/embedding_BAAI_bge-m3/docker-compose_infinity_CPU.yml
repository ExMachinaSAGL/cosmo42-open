services:
  infinity-cpu-embedding-baai_bge-m3:
    image: michaelf34/infinity:latest
    container_name: cpu-embeddings
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data/huggingface:/app/.cache
    command:
      - "v2"
      - "--model-id"
      - "BAAI/bge-m3"
      - "--port"
      - "8001"

