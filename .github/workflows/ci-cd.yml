name: ci/cd

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-test-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 25, Maven)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify Docker is available (Testcontainers)
        run: docker info

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload Surefire reports on failure
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports

  frontend:
    name: Frontend (Node 20, Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test -- --run
      - run: npm run lint
      - run: npm run build